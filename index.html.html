<script>
// App Global States
let dictionary = {};
let rawPhrases = [];
let selectedIndices = new Set();
let dynamicActivePool = [];
let currentLearnIndex = 0;
let isBreakdownOpen = false;

// Game State Engine Variables
let gameDeck = [];
let gameCurrentItem = null;
let gameAwaitingNext = false;

// New Function: Fetch external data file dynamically
async function loadAppData() {
    try {
        // Fetches 'phrases.json' relative to your site location
        const response = await fetch('./phrases.json');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        
        dictionary = data.dictionary;
        rawPhrases = data.rawPhrases;
        
        // Data successfully structured, now spawn the UI layout
        initMenu();
    } catch (error) {
        console.error("Failed to load application phrases database:", error);
        document.getElementById('phrase-list').innerHTML = `
            <div style="padding: 20px; color: var(--danger); text-align: center; font-weight: bold;">
                Error: Unable to load vocabulary records. Please check configurations.
            </div>`;
    }
}

// Initial setup to construct selection elements on load
function initMenu() {
    const listContainer = document.getElementById('phrase-list');
    listContainer.innerHTML = '';
    
    rawPhrases.forEach((phrase, index) => {
        const row = document.createElement('div');
        row.className = 'phrase-row';
        row.id = `phrase-row-${index}`;
        row.onclick = () => toggleSelectRow(index);

        const cleanDisplayJapanese = phrase.j.replace(/\s+/g, '');

        row.innerHTML = `
            <input type="checkbox" id="check-${index}" data-index="${index}" onclick="event.stopPropagation(); toggleSelectRow(${index});">
            <div class="phrase-row-text">
                <span class="p-eng">${phrase.e}</span>
                <span class="p-japanese">${cleanDisplayJapanese}</span>
            </div>
        `;
        listContainer.appendChild(row);
    });
    updateActionButtons();
}

// Page setup execution updated to call the network loader instead
document.addEventListener("DOMContentLoaded", () => {
    loadAppData();
});

function toggleSelectRow(index) {
    const checkbox = document.getElementById(`check-${index}`);
    const row = document.getElementById(`phrase-row-${index}`);
    
    if (selectedIndices.has(index)) {
        selectedIndices.delete(index);
        checkbox.checked = false;
        row.classList.remove('selected');
    } else {
        selectedIndices.add(index);
        checkbox.checked = true;
        row.classList.add('selected');
    }
    updateActionButtons();
}

function selectAll(shouldSelectAll) {
    selectedIndices.clear();
    rawPhrases.forEach((_, index) => {
        const checkbox = document.getElementById(`check-${index}`);
        const row = document.getElementById(`phrase-row-${index}`);
        checkbox.checked = shouldSelectAll;
        if (shouldSelectAll) {
            selectedIndices.add(index);
            row.classList.add('selected');
        } else {
            row.classList.remove('selected');
        }
    });
    updateActionButtons();
}

function selectTopN(count) {
    selectedIndices.clear();
    
    if (count < 1) count = 0;
    if (count > rawPhrases.length) count = rawPhrases.length;

    rawPhrases.forEach((_, index) => {
        const checkbox = document.getElementById(`check-${index}`);
        const row = document.getElementById(`phrase-row-${index}`);
        
        if (index < count) {
            selectedIndices.add(index);
            checkbox.checked = true;
            row.classList.add('selected');
        } else {
            checkbox.checked = false;
            row.classList.remove('selected');
        }
    });
    updateActionButtons();
}

function handleSelectorKey(e) {
    if (e.key === 'Enter') {
        const value = parseInt(e.target.value, 10);
        if (!isNaN(value)) {
            selectTopN(value);
        }
    }
}

function updateActionButtons() {
    const count = selectedIndices.size;
    const learnBtn = document.getElementById('btn-start-learn');
    const gameBtn = document.getElementById('btn-start-game');
    
    if (count > 0) {
        learnBtn.disabled = false;
        gameBtn.disabled = false;
        learnBtn.innerText = `Learn Mode (${count})`;
        gameBtn.innerText = `Play Flashcard Game (${count})`;
    } else {
        learnBtn.disabled = true;
        gameBtn.disabled = true;
        learnBtn.innerText = 'Learn Mode';
        gameBtn.innerText = 'Play Flashcard Game';
    }
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function changeView(viewName) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    
    const title = document.getElementById('app-title');
    const subtitle = document.getElementById('app-subtitle');

    if (viewName === 'menu') {
        title.innerText = "Japanese Studio";
        subtitle.innerText = "Select phrases to begin learning";
        document.getElementById('view-menu').classList.add('active');
    } else if (viewName === 'learn') {
        title.innerText = "Learn Mode";
        subtitle.innerText = "Understand translations and structure at your own pace";
        document.getElementById('view-learn').classList.add('active');
    } else if (viewName === 'game') {
        title.innerText = "Flashcard Quiz";
        subtitle.innerText = "Type matching Japanese or Romaji words. Wrong answers cycle back!";
        document.getElementById('view-game').classList.add('active');
    } else if (viewName === 'victory') {
        title.innerText = "Complete!";
        subtitle.innerText = "Amazing performance!";
        document.getElementById('view-victory').classList.add('active');
    }
}

function startMode(mode) {
    dynamicActivePool = Array.from(selectedIndices).map(idx => rawPhrases[idx]);
    shuffle(dynamicActivePool);

    if (mode === 'learn') {
        currentLearnIndex = 0;
        isBreakdownOpen = false;
        document.getElementById('learn-breakdown').style.display = 'none';
        document.getElementById('btn-toggle-breakdown').innerText = "Show Breakdown";
        showLearnPhrase();
        changeView('learn');
    } else if (mode === 'game') {
        gameDeck = [...dynamicActivePool];
        gameAwaitingNext = false;
        document.getElementById('btn-submit-answer').innerText = "Submit Answer";
        document.getElementById('game-input').readOnly = false;
        document.getElementById('game-input').value = "";
        document.getElementById('game-feedback').className = "feedback-msg";
        document.getElementById('game-feedback').innerText = "";
        nextGameCard();
        changeView('game');
    }
}

function showLearnPhrase() {
    const item = dynamicActivePool[currentLearnIndex];
    document.getElementById('learn-progress').innerText = `Phrase ${currentLearnIndex + 1} of ${dynamicActivePool.length}`;
    
    document.getElementById('learn-english').innerText = item.e;
    document.getElementById('learn-japanese').innerText = `${item.j.replace(/\s+/g, '')} (${item.r})`;
    
    const grid = document.getElementById('learn-words-grid');
    grid.innerHTML = '';
    
    const cleaned = item.j.replace(/[?.!,...。、？]/g, '').split(/\s+/);
    const uniqueWords = [...new Set(cleaned)].filter(w => w.trim() !== "");

    uniqueWords.forEach(word => {
        const meaning = dictionary[word] || "meaning parsing";
        const tag = document.createElement('div');
        tag.className = 'word-tag';
        tag.innerHTML = `<strong>${word}</strong>: ${meaning}`;
        grid.appendChild(tag);
    });
}

function nextLearnPhrase() {
    currentLearnIndex++;
    if (currentLearnIndex >= dynamicActivePool.length) {
        changeView('menu');
    } else {
        showLearnPhrase();
    }
}

function toggleBreakdown() {
    const box = document.getElementById('learn-breakdown');
    const btn = document.getElementById('btn-toggle-breakdown');
    isBreakdownOpen = !isBreakdownOpen;
    if (isBreakdownOpen) {
        box.style.display = 'block';
        btn.innerText = "Hide Breakdown";
    } else {
        box.style.display = 'none';
        btn.innerText = "Show Breakdown";
    }
}

function nextGameCard() {
    if (gameDeck.length === 0) {
        changeView('victory');
        return;
    }
    
    gameCurrentItem = gameDeck[0];
    document.getElementById('game-progress').innerText = `Remaining Cards: ${gameDeck.length}`;
    document.getElementById('game-english').innerText = gameCurrentItem.e;
    
    const inputEl = document.getElementById('game-input');
    inputEl.value = "";
    inputEl.readOnly = false;
    inputEl.focus();
    
    document.getElementById('game-feedback').innerText = "";
    document.getElementById('game-feedback').className = "feedback-msg";
    document.getElementById('btn-submit-answer').innerText = "Submit Answer";
    gameAwaitingNext = false;
}

function checkGameAnswer() {
    const inputEl = document.getElementById('game-input');
    const feedbackEl = document.getElementById('game-feedback');
    const submitBtn = document.getElementById('btn-submit-answer');
    
    if (gameAwaitingNext) {
        nextGameCard();
        return;
    }
    
    const rawUserVal = inputEl.value.trim();
    const cleanUser = rawUserVal.replace(/\s+/g, '').toLowerCase();
    const cleanTargetJap = gameCurrentItem.j.replace(/\s+/g, '');
    
    const isCorrect = (cleanUser === cleanTargetJap) || 
                      (rawUserVal.toLowerCase() === gameCurrentItem.r.toLowerCase());
                      
    if (isCorrect) {
        feedbackEl.innerText = "正解(せいかい)！ Correct!";
        feedbackEl.className = "feedback-msg correct";
        gameDeck.shift();
    } else {
        feedbackEl.innerText = `残念(ざんねん)！ Incorrect. Correct Answer: ${cleanTargetJap}`;
        feedbackEl.className = "feedback-msg wrong";
        
        const failedCard = gameDeck.shift();
        gameDeck.push(failedCard);
    }
    
    inputEl.readOnly = true;
    submitBtn.innerText = "Next Card";
    gameAwaitingNext = true;
}

document.getElementById('game-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        checkGameAnswer();
    }
});
</script>
